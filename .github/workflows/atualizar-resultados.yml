name: Atualizar Resultados

on:
  schedule:
    # Executa a cada 30 minutos
    - cron: "*/30 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml

      - name: Executar atualização
        run: python update_deu_no_poste.py

      - name: Enviar alterações para o GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add resultados.csv resultado.html

          git diff --cached --quiet || git commit -m "Atualização automática dos resultados"

          git push
