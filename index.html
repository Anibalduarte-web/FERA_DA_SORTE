<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fera da Sorte</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
}

.container {
    position: relative;
    width: 1000px;
    max-width: 100%;
}

.container img { width: 100%; display: block; }

/* Áreas invisíveis clicáveis no Computador */
.area-click {
    position: absolute;
    top: 35%;
    left: 34%;
    width: 28%;
    height: 5%;
    border: none; /* Apenas para debug, remova depois */
    cursor: pointer; z-index: 10;
}

.area-palpite {
    position: absolute;
    top: 35%;
    left: 74%;
    width: 20%;
    height: 7%;
    border: none; /* Apenas para debug, remova depois */
    cursor: pointer; z-index: 10;
}

/* CAIXA DE RESULTADOS */
.tabela-box {
    position: absolute;
    top: 36%; left: 18%;
    width: 46%; height: 48%;
    background: rgba(10, 7, 2, 0.97);
    border: 2px solid #c9a227;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    z-index: 20;
    padding: 10px;
    box-shadow: 0 0 24px rgba(201,162,39,0.4);
}

.botoes-filtro {
    display: flex; gap: 6px;
    justify-content: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
}

.botoes-filtro button {
    background: #2a1f10; color: #c9a227;
    border: 1px solid #c9a227;
    padding: 5px 12px; border-radius: 6px;
    cursor: pointer; font-weight: bold;
    font-size: 11px; transition: 0.2s;
}

.botoes-filtro button:hover { background: #c9a227; color: #1a1008; transform: scale(1.05); }

.btn-fechar { background: #7f1d1d !important; color: white !important; border-color: #ef4444 !important; }
.btn-palpite-cel { display: none !important; } /* Escondido no PC */

.cabecalho {
    display: grid;
    grid-template-columns: 1.2fr 1fr 0.8fr 1.1fr 1.1fr 0.6fr 1.6fr;
    text-align: center; color: #c9a227;
    font-weight: bold; font-size: 11px;
    border-bottom: 1px solid #c9a227;
    padding-bottom: 6px; margin-bottom: 6px;
}

.grid-resultados { overflow-y: auto; flex: 1; padding-right: 4px; }
.grid-resultados::-webkit-scrollbar { width: 5px; }
.grid-resultados::-webkit-scrollbar-thumb { background: #c9a227; border-radius: 4px; }

.linha {
    display: grid;
    grid-template-columns: 1.2fr 1fr 0.8fr 1.1fr 1.1fr 0.6fr 1.6fr;
    text-align: center;
    padding: 6px 3px; margin-bottom: 4px;
    border-radius: 5px; font-size: 12px;
    color: white; border-left: 3px solid #c9a227;
    background: rgba(201,162,39,0.07);
    align-items: center;
    animation: fadeIn 0.3s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
}

.grupo-col { font-weight: bold; color: #c9a227; }
.bicho-col { font-weight: bold; font-size: 13px; }
.msg-status { text-align: center; color: #aaa; font-size: 13px; margin-top: 20px; }
.msg-erro { color: #ef4444; }

.titulo-data{

    background:#1a1a1a;

    color:#FFD700;

    border:2px solid #FFD700;

    padding:12px;

    margin:20px 0 10px 0;

    text-align:center;

    font-size:20px;

    font-weight:bold;

    border-radius:8px;

    letter-spacing:1px;

}

/* =========================================================
📱 MODO CELULAR (APP RESPONSIVO PROFISSIONAL)
   ========================================================= */
@media(max-width: 768px) {
    
    body { align-items: flex-start; padding: 0; margin: 0; }
    
    .container { width: 100%; min-height: 100vh; }
    
    /* Esconde o Mockup fixo e Ã¡reas clicÃ¡veis, transformando num app nativo */
    .btn-fechar{
    display:none !important;
}

    /* Tabela vira a tela inteira do App */
    .tabela-box {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100vh;
        border: none; border-radius: 0;
        background: #0a0a0a;
        display: none; /* Sempre visível no mobile */
        padding: 10px 6px;
    }

    /* Cabeçalho falso que aparece apenas no celular */
    .tabela-box::before {
        content: 'FERA DA SORTE';
        display: block; text-align: center;
        color: #c9a227; font-size: 18px; font-weight: bold;
        padding: 15px 0 20px 0; text-shadow: 0 0 10px rgba(201,162,39,0.5);
    }

    /* Botões crescem e se adaptam aos dedos */
    .botoes-filtro { gap: 8px; margin-bottom: 15px; }
    .botoes-filtro button {
        padding: 10px 8px; font-size: 13px;
        flex: 1 1 30%; /* Cobre bem os espaÃ§os */
    }

    /* Exibir botão especial do João no mobile */
    .btn-palpite-cel { 
        display: inline-block !important; 
        background: #b91c1c !important; color: white !important; 
        border-color: #ef4444 !important; flex: 1 1 100% !important;
    }

    /* Textos saltam Ã  vista */
    .cabecalho { font-size: 12px; padding-bottom: 8px; }
    .linha { font-size: 14px; padding: 12px 2px; margin-bottom: 6px; }
    .bicho-col { font-size: 15px; }
    
    .grid-resultados::-webkit-scrollbar { width: 0px; } /* Oculta barra no Celular */
}

</style>
</head>
<body>

<div class="container">
    <img src="Site-Fera da Sorte.png" alt="Fera da Sorte">

    <div class="area-click" onclick="toggleResultados()"></div>
    <div class="area-palpite" onclick="abrirPalpites()"></div>

    <div id="tabela" class="tabela-box">

        <div class="botoes-filtro">
            <button onclick="carregarResultados()">🔄 Todos</button>
            <button onclick="carregarResultados('09:30')">09:30</button>
            <button onclick="carregarResultados('11:30')">11:30</button>
            <button onclick="carregarResultados('14:30')">14:30</button>
            <button onclick="carregarResultados('16:30')">16:30</button>
            <button onclick="carregarResultados('18:30')">18:30</button>
            <button onclick="carregarResultados('20:00')">20:00</button>
            <button onclick="carregarResultados('21:30')">21:30</button>
            
            <!-- Botão especial do João visível só no celular -->
            <button class="btn-palpite-cel" onclick="abrirPalpites()"> YouTube: Palpites do João</button>
            <!-- Botão fechar sumirá no celular -->
            <button class="btn-fechar" onclick="fecharTabela()">✖ Fechar</button>
        </div>

        <div class="cabecalho">
            <div>Banca</div><div>Hora</div><div>Prêmio</div>
            <div>Milhar</div><div>Centena</div><div>Grupo</div><div>Bicho</div>
        </div>

        <div id="lista-resultados" class="grid-resultados">
            <div class="msg-status">Carregando...</div>
        </div>
    </div>
</div>

<script>
var EMOJI = {
    "Avestruz":"🦩","Aguia":"🥩","Burro":"🐴","Borboleta":"🦋",
    "Cachorro":"🐶","Cabra":"🐐","Carneiro":"🐏","Camelo":"🐫",
    "Cobra":"🐍","Coelho":"🐇","Cavalo":"🐎","Elefante":"🐘",
    "Galo":"🐓","Gato":"🐱","Jacare":"🐊","Leao":"🦁",
    "Macaco":"🐒","Porco":"🐖","Pavao":"🧊","Peru":"🦃",
    "Touro":"🐂","Tigre":"🐅","Urso":"🐻","Veado":"🦌",
    "Vaca":"🐄"
};

function getEmoji(bicho) {
    var b = (bicho || "").trim()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z]/g, "");
    b = b.charAt(0).toUpperCase() + b.slice(1).toLowerCase();
    return EMOJI[b] || "❓";
}

function abrirPalpites() {
    window.open("https://www.youtube.com/channel/UCekfnO-XM6IAepw7gzwukWA", "_blank");
}

function fecharTabela() {
    document.getElementById("tabela").style.display = "none";
}

function toggleResultados() {

    var box = document.getElementById("tabela");

    if (box.style.display === "flex") {

        box.style.display = "none";
        box.style.visibility = "hidden";

    } else {

        box.style.display = "flex";
        box.style.visibility = "visible";

        carregarResultadosHoje();

    }

}

window.onload = function () {

    var box = document.getElementById("tabela");

    box.style.display = "none";
    box.style.visibility = "hidden";

    console.log("Atualizando resultados...");

    fetch("/atualizar")
        .then(function (r) {
            if (!r.ok)
                throw new Error("Erro ao atualizar");

            return r.text();
        })
        .then(function () {

            console.log("Atualização concluída!");

            // AGORA SIM
            carregarResultadosHoje();

        })
        .catch(function (e) {

            console.error(e);

        });

}

function carregarResultados(filtro) {
    filtro = filtro || "";
    var lista = document.getElementById("lista-resultados");
    lista.innerHTML = '<div class="msg-status">Carregando...</div>';

    fetch("resultados.csv?t=" + Date.now(),{
        cache: "no-store"
    })
    .then(function(r){
    console.log("CSV veio de:", r.url);
    return r.text();
})
    .then(function(texto) {
        var linhas = texto.trim().split("\n");
        console.log("Linhas do CSV:", linhas.length);
        if (linhas.length <= 1) {
            lista.innerHTML = '<div class="msg-status">Arquivo CSV vazio.</div>';
            return;
        }

        var html = "";
        var total = 0;
        var dataAnterior = "";

        for (var i = 1; i < linhas.length; i++) {
            var l = linhas[i].trim();
            if (!l) continue;
            var c = l.split(";");
            var data = (c[0] || "").trim();
            console.log(data);
            if (c.length < 8) continue;

            var banca   = (c[1] || "").trim();
            var hora    = (c[2] || "").trim();
            var premio  = (c[3] || "").trim();
            var milhar  = (c[4] || "").trim();
            var centena = (c[5] || "").trim();
            var grupo   = (c[6] || "").trim().padStart(2, "0");
            var bicho   = (c[7] || "").trim();
            var emoji   = getEmoji(bicho);

            if (filtro && hora !== filtro) continue;
            total++;
            if (data !== dataAnterior) {

    html +=
    '<div class="titulo-data">📅 RESULTADOS DO DIA ' + data + '</div>';

    dataAnterior = data;
}

            html += '<div class="linha">' +
                '<div>' + banca   + '</div>' +
                '<div>' + hora    + '</div>' +
                '<div>' + premio  + '</div>' +
                '<div>' + milhar  + '</div>' +
                '<div>' + centena + '</div>' +
                '<div class="grupo-col">' + grupo + '</div>' +
                '<div class="bicho-col">' + emoji + ' ' + bicho + '</div>' +
                '</div>';
        }

        lista.innerHTML = total > 0
            ? html
            : '<div class="msg-status">Sem resultados para ' + (filtro || "mostrar") + '.</div>';
    })
    .catch(function(e) {
        lista.innerHTML = '<div class="msg-status msg-erro">â  Erro ao ler resultados.csv<br><small>Certifique-se de estar rodando pelo Servidor (Live Server)</small></div>';
        console.error(e);
    });
}
function carregarResultadosHoje(filtro) {

    filtro = filtro || "";

    var lista = document.getElementById("lista-resultados");
    lista.innerHTML = '<div class="msg-status">Carregando...</div>';

    fetch("resultados.csv?t=" + Date.now())
    .then(function(r){
        if(!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
    })
    .then(function(texto){

        var linhas = texto.trim().split("\n");

        if(linhas.length <= 1){
            lista.innerHTML = '<div class="msg-status">Arquivo CSV vazio.</div>';
            return;
        }

        // Descobre a Última data do CSV
        // Descobre corretamente a data mais recente

var ultimaData = "";
var maiorData = null;

for (var i = 1; i < linhas.length; i++) {

    var l = linhas[i].trim();

    if (!l) continue;

    var c = l.split(";");

    if (c.length < 8) continue;

    var d = c[0].trim();

    var p = d.split("/");

    if (p.length != 3) continue;

    var dataObj = new Date(

        parseInt(p[2]),
        parseInt(p[1]) - 1,
        parseInt(p[0])

    );

    if (maiorData == null || dataObj > maiorData) {

        maiorData = dataObj;

        ultimaData = d;

    }

}

console.log("Última data encontrada:", ultimaData);

        var html = "";
        var total = 0;

        html += '<div class="titulo-data">📅 RESULTADOS DO DIA ' + ultimaData + '</div>';

        for (var i = 1; i < linhas.length; i++) {

            var l = linhas[i].trim();

            if(!l) continue;

            var c = l.split(";");

            if(c.length < 8) continue;

            var data = c[0].trim();

            if(data != ultimaData)
                continue;

            var banca   = c[1].trim();
            var hora    = c[2].trim();
            var premio  = c[3].trim();
            var milhar  = c[4].trim();
            var centena = c[5].trim();
            var grupo   = c[6].trim().padStart(2,"0");
            var bicho   = c[7].trim();

            var emoji = getEmoji(bicho);

            if(filtro && hora != filtro)
                continue;

            total++;

            html += '<div class="linha">'+
                    '<div>'+banca+'</div>'+
                    '<div>'+hora+'</div>'+
                    '<div>'+premio+'</div>'+
                    '<div>'+milhar+'</div>'+
                    '<div>'+centena+'</div>'+
                    '<div class="grupo-col">'+grupo+'</div>'+
                    '<div class="bicho-col">'+emoji+' '+bicho+'</div>'+
                    '</div>';

        }

        lista.innerHTML = total > 0
            ? html
            : '<div class="msg-status">Sem resultados para hoje.</div>';

    })
    .catch(function(e){

        console.error(e);

        lista.innerHTML =
        '<div class="msg-status msg-erro">Erro ao carregar resultados.</div>';

    });

}

</script>

</body>
</html>
